services:
  neo4j:
    image: neo4j:5.22-community
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD}
      NEO4J_dbms_security_procedures_unrestricted: gds.*
      NEO4J_dbms_memory_pagecache_size: 512m
      NEO4J_dbms_memory_heap_initial__size: 512m
      NEO4J_dbms_memory_heap_max__size: 512m
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    networks:
      - meds-network

  db:
    image: pgvector/pgvector:pg15
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-genhospi_catalog}
      POSTGRES_USER: ${POSTGRES_USER:-genhospi_admin}
      # SECURITY: sin fallback — definir POSTGRES_PASSWORD en el archivo .env
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      # Host port 5433 → container port 5432 to avoid local conflicts
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - meds-network

  redis:
    image: redis:7-alpine
    # SECURITY: Redis con autenticación obligatoria — definir REDIS_PASSWORD en .env
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      # SECURITY: bind solo a loopback para evitar acceso externo no intencionado
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    networks:
      - meds-network

  backend:
    build: ./backend
    # --reload eliminado: activa watchfiles que consume CPU y produce starvation
    # del event loop bajo carga concurrente (Anomalía 5 k6, p(99)/health=1.82s).
    # --workers 2: dos procesos ASGI independientes; aisla la carga entre requests.
    # Para desarrollo con hot-reload, usar: uvicorn ... --reload --workers 1
    command: sh -c "alembic upgrade head && alembic -c alembic_pricing.ini upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2"
    environment:
      # SECURITY: sin fallback con contraseñas — todas las URLs deben definirse en .env
      DATABASE_URL: ${DB_CATALOG_URL}
      DB_URL: ${DB_CATALOG_URL}
      DB_CATALOG_URL: ${DB_CATALOG_URL}
      DB_PRICING_URL: ${DB_PRICING_URL}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      OPENAI_KEY: ${OPENAI_KEY:-}
      SOCRATA_APP_TOKEN: ${SOCRATA_APP_TOKEN:-}
      NEO4J_URI: ${NEO4J_URI:-bolt://neo4j:7687}
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-neo4j_password}
      NEO4J_DATABASE: ${NEO4J_DATABASE:-neo4j}
      CUM_BATCH_SIZE: ${CUM_BATCH_SIZE:-2000}
      PYTHONPATH: /app
    volumes:
      - ./backend:/app
    ports:
      - "${WEB_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - meds-network

  worker:
    build: ./backend
    command: sh -c "celery -A app.worker.tasks.celery_app worker --loglevel=info"
    environment:
      # SECURITY: sin fallback con contraseñas — todas las URLs deben definirse en .env
      DATABASE_URL: ${DB_CATALOG_URL}
      DB_URL: ${DB_CATALOG_URL}
      DB_CATALOG_URL: ${DB_CATALOG_URL}
      DB_PRICING_URL: ${DB_PRICING_URL}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND}
      OPENAI_KEY: ${OPENAI_KEY:-}
      SOCRATA_APP_TOKEN: ${SOCRATA_APP_TOKEN:-}
      NEO4J_URI: ${NEO4J_URI:-bolt://neo4j:7687}
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-neo4j_password}
      NEO4J_DATABASE: ${NEO4J_DATABASE:-neo4j}
      CUM_BATCH_SIZE: ${CUM_BATCH_SIZE:-2000}
      PYTHONPATH: /app
    volumes:
      # SECURITY: el worker solo necesita acceso a uploads y output,
      # no al código fuente completo. En producción, eliminar este volumen
      # y confiar en la imagen Docker construida (sin bind-mount de código).
      - ./backend/uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - meds-network

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000/graphql}
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000/graphql}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - backend
    networks:
      - meds-network

  influxdb:
    image: influxdb:1.8
    profiles:
      - perf
    ports:
      - "8086:8086"
    environment:
      - INFLUXDB_DB=k6
    networks:
      - meds-network

  grafana:
    image: grafana/grafana:latest
    profiles:
      - perf
    ports:
      - "3001:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_BASIC_ENABLED=false
    depends_on:
      - influxdb
    networks:
      - meds-network

  k6:
    image: grafana/k6:latest
    profiles:
      - perf
    volumes:
      - ./k6:/k6
    environment:
      GRAPHQL_URL: ${GRAPHQL_URL:-http://backend:8000/graphql}
    command: run --out influxdb=http://influxdb:8086/k6 /k6/script.js
    depends_on:
      - backend
      - influxdb
    networks:
      - meds-network

  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@genhospi.dev}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: "False"
      # Carga el servidor automáticamente al iniciar
      PGADMIN_SERVER_JSON_FILE: /pgadmin4/servers.json
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./docker/pgadmin/servers.json:/pgadmin4/servers.json:ro
      - ./docker/pgadmin/pgpass:/pgpass:ro
    depends_on:
      db:
        condition: service_healthy
    networks:
      - meds-network

networks:
  meds-network:
    driver: bridge

volumes:
  neo4j_data:
  neo4j_logs:
  postgres_data:
  pgadmin_data: