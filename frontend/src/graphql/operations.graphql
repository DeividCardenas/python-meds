query SearchMedicamentos($texto: String!, $empresa: String, $soloActivos: Boolean, $formaFarmaceutica: String) {
  buscarMedicamentos(texto: $texto, empresa: $empresa, soloActivos: $soloActivos, formaFarmaceutica: $formaFarmaceutica) {
    id
    nombreLimpio
    distancia
    idCum
    laboratorio
    formaFarmaceutica
    registroInvima
    principioActivo
    precioUnitario
    precioEmpaque
    esRegulado
    precioMaximoRegulado
    activo
    estadoCum
  }
}

query ComparativaPrecios($principioActivo: String!) {
  comparativaPrecios(principioActivo: $principioActivo) {
    id
    nombreLimpio
    idCum
    laboratorio
    formaFarmaceutica
    principioActivo
    precioUnitario
    precioEmpaque
    esRegulado
    precioMaximoRegulado
    mejorPrecioProveedor
    mejorProveedorNombre
  }
}

# ---------------------------------------------------------------------------
# Bulk hospital quotation
# ---------------------------------------------------------------------------

fragment PrecioItem on PrecioItemNode {
  proveedorNombre
  precioUnitario
  precioUnidad
  precioPresentacion
  porcentajeIva
  vigenteDesde
  vigenteHasta
  fechaPublicacion
}

fragment ResumenCotizacion on ResumenCotizacionNode {
  total
  conMatch
  sinMatch
  conPrecio
  sinPrecio
  tasaMatch
  tasaPrecio
}

fragment CotizacionFila on CotizacionFilaNode {
  nombreInput
  matchStage
  matchConfidence
  cumId
  nombreMatcheado
  formaFarmaceutica
  concentracion
  rejectReason
  innScore
  preciosCount
  esRegulado
  precioMaximoRegulado
  mejorPrecio {
    ...PrecioItem
  }
  todosPrecios {
    ...PrecioItem
  }
}

mutation IniciarCotizacion($file: Upload!, $hospitalId: String) {
  iniciarCotizacion(file: $file, hospitalId: $hospitalId) {
    id
    status
    filename
    hospitalId
    fechaCreacion
  }
}

query GetCotizacion($id: ID!) {
  getCotizacion(id: $id) {
    id
    status
    filename
    hospitalId
    fechaCreacion
    fechaCompletado
    resumen {
      ...ResumenCotizacion
    }
    filas {
      ...CotizacionFila
    }
  }
}

# ---------------------------------------------------------------------------
# Supplier price upload (CargaProveedor flow)
# ---------------------------------------------------------------------------

mutation SubirArchivoProveedor($file: Upload!) {
  subirArchivoProveedor(file: $file) {
    id
    filename
    status
    columnasDetectadas
    mapeoSugerido
  }
}

mutation ConfirmarMapeoProveedor($archivoId: ID!, $mapeo: MapeoColumnasInput!) {
  confirmarMapeoProveedor(archivoId: $archivoId, mapeo: $mapeo) {
    id
    filename
    status
    columnasDetectadas
    mapeoSugerido
  }
}

mutation AprobarStagingFila($stagingId: ID!, $idCum: String!) {
  aprobarStagingFila(stagingId: $stagingId, idCum: $idCum) {
    id
    filaNumero
    cumCode
    precioUnitario
    precioUnidad
    precioPresentacion
    porcentajeIva
    descripcionRaw
    estadoHomologacion
    sugerenciasCum
    datosRaw
    fechaVigenciaIndefinida
    confianzaScore
  }
}

mutation PublicarPreciosProveedor($archivoId: ID!) {
  publicarPreciosProveedor(archivoId: $archivoId) {
    filasPublicadas
    archivoId
    status
  }
}

query GetStagingFilas($archivoId: ID!) {
  getStagingFilas(archivoId: $archivoId) {
    id
    filaNumero
    cumCode
    precioUnitario
    precioUnidad
    precioPresentacion
    porcentajeIva
    descripcionRaw
    estadoHomologacion
    sugerenciasCum
    datosRaw
    fechaVigenciaIndefinida
    confianzaScore
  }
}
